backend:
  name: github
  repo: hsvanda18/hotel-rainha-njinga
  branch: master
  base_url: https://decapcms.org

locale: pt

media_folder: public/images/cms
public_folder: /images/cms

collections:
  - name: quartos
    label: Quartos
    label_singular: Quarto
    files:
      - name: quartos
        label: Lista de Quartos
        file: src/data/rooms.json
        fields:
          - label: Quartos
            name: rooms
            widget: list
            fields:
              - { label: ID, name: id, widget: string }
              - { label: Nome, name: name, widget: string }
              - { label: Tipo, name: type, widget: string }
              - { label: Descrição, name: desc, widget: text }
              - { label: "Preço (USD/noite)", name: price, widget: string }
              - { label: Área, name: size, widget: string }
              - { label: Hóspedes, name: guests, widget: string }
              - { label: Imagem Principal (URL), name: image, widget: string }
              - label: Imagens da Galeria (URLs)
                name: images
                widget: list
                field: { label: URL, name: url, widget: string }
              - label: Características Rápidas
                name: features
                widget: list
                field: { label: Característica, name: feature, widget: string }
              - { label: Destaque, name: featured, widget: boolean, default: false }
              - { label: Badge, name: badge, widget: string, required: false }
              - { label: Check-in, name: checkin, widget: string }
              - { label: Check-out, name: checkout, widget: string }
              - { label: Política de Cancelamento, name: cancelPolicy, widget: string }
              - label: Comodidades
                name: amenities
                widget: object
                fields:
                  - label: Quarto
                    name: quarto
                    widget: list
                    field: { label: Item, name: item, widget: string }
                  - label: Casa de Banho
                    name: banheiro
                    widget: list
                    field: { label: Item, name: item, widget: string }
                  - label: Tecnologia
                    name: tecnologia
                    widget: list
                    field: { label: Item, name: item, widget: string }
                  - label: Serviços
                    name: servicos
                    widget: list
                    field: { label: Item, name: item, widget: string }

  - name: galeria
    label: Galeria
    files:
      - name: galeria
        label: Imagens da Galeria
        file: src/data/gallery.json
        fields:
          - label: Imagens
            name: images
            widget: list
            fields:
              - { label: ID, name: id, widget: string }
              - { label: "URL Alta Resolução", name: src, widget: string }
              - { label: "URL Miniatura", name: thumb, widget: string }
              - { label: Texto Alternativo, name: alt, widget: string }
              - { label: Legenda, name: label, widget: string }
              - label: Categoria
                name: category
                widget: select
                options:
                  - { label: Exterior & Luanda, value: exterior }
                  - { label: Quartos, value: quartos }
                  - { label: Restaurante & Bar, value: restaurante }
                  - { label: Eventos, value: eventos }
              - { label: Destaque, name: featured, widget: boolean, default: false }
          - label: Categorias
            name: categories
            widget: list
            fields:
              - { label: Chave, name: key, widget: string }
              - { label: Nome, name: label, widget: string }

  - name: restaurante
    label: Restaurante
    files:
      - name: restaurante
        label: Menu do Restaurante
        file: src/data/restaurant.json
        fields:
          - label: Menu
            name: menu
            widget: object
            fields:
              - label: Entradas
                name: entradas
                widget: list
                fields:
                  - { label: ID, name: id, widget: string }
                  - { label: Nome, name: name, widget: string }
                  - { label: Descrição, name: desc, widget: text }
                  - { label: Preço, name: price, widget: string }
                  - label: Badges
                    name: badges
                    widget: list
                    field: { label: Badge, name: badge, widget: string }
              - label: Pratos Principais
                name: principais
                widget: list
                fields:
                  - { label: ID, name: id, widget: string }
                  - { label: Nome, name: name, widget: string }
                  - { label: Descrição, name: desc, widget: text }
                  - { label: Preço, name: price, widget: string }
                  - { label: Destaque, name: featured, widget: boolean, default: false }
                  - label: Badges
                    name: badges
                    widget: list
                    field: { label: Badge, name: badge, widget: string }
              - label: Sobremesas
                name: sobremesas
                widget: list
                fields:
                  - { label: ID, name: id, widget: string }
                  - { label: Nome, name: name, widget: string }
                  - { label: Descrição, name: desc, widget: text }
                  - { label: Preço, name: price, widget: string }
                  - label: Badges
                    name: badges
                    widget: list
                    field: { label: Badge, name: badge, widget: string }
              - label: Cocktails & Bar
                name: cocktails
                widget: list
                fields:
                  - { label: ID, name: id, widget: string }
                  - { label: Nome, name: name, widget: string }
                  - { label: Descrição, name: desc, widget: text }
                  - { label: Preço, name: price, widget: string }
                  - { label: Destaque, name: featured, widget: boolean, default: false }
                  - label: Badges
                    name: badges
                    widget: list
                    field: { label: Badge, name: badge, widget: string }
          - label: Horários
            name: hours
            widget: list
            fields:
              - { label: Refeição, name: meal, widget: string }
              - { label: Horário, name: time, widget: string }
              - { label: Dias, name: days, widget: string }
          - label: Destaques
            name: highlights
            widget: list
            fields:
              - { label: Etiqueta, name: label, widget: string }
              - { label: Valor, name: value, widget: string }

  - name: eventos
    label: Eventos
    files:
      - name: eventos
        label: Espaços para Eventos
        file: src/data/events.json
        fields:
          - label: Espaços
            name: spaces
            widget: list
            fields:
              - { label: ID, name: id, widget: string }
              - { label: Nome, name: name, widget: string }
              - { label: Descrição, name: desc, widget: text }
              - { label: Área, name: size, widget: string }
              - { label: "Imagem (URL)", name: image, widget: string }
              - { label: Badge, name: badge, widget: string }
              - label: Capacidade
                name: capacity
                widget: object
                fields:
                  - { label: Teatro, name: teatro, widget: number, required: false, value_type: int }
                  - { label: Banquete, name: banquete, widget: number, required: false, value_type: int }
                  - { label: Cocktail, name: cocktail, widget: number, required: false, value_type: int }
                  - { label: Escola, name: escola, widget: number, required: false, value_type: int }
              - label: Características
                name: features
                widget: list
                field: { label: Característica, name: feature, widget: string }
          - label: Tipos de Evento
            name: eventTypes
            widget: list
            fields:
              - { label: ID, name: id, widget: string }
              - label: Ícone
                name: icon
                widget: select
                options: [Briefcase, Mic, Heart, PartyPopper]
              - { label: Nome, name: name, widget: string }
              - { label: Descrição, name: desc, widget: text }
              - label: Incluído
                name: items
                widget: list
                field: { label: Item, name: item, widget: string }
          - label: Equipamento
            name: equipment
            widget: list
            fields:
              - { label: Nome, name: name, widget: string }
              - { label: Descrição, name: desc, widget: string }
          - label: Pacotes
            name: packages
            widget: list
            fields:
              - { label: ID, name: id, widget: string }
              - { label: Nome, name: name, widget: string }
              - { label: Preço, name: price, widget: string }
              - { label: Unidade, name: unit, widget: string }
              - { label: Descrição, name: desc, widget: string }
              - { label: Destaque, name: highlight, widget: boolean, default: false }
              - { label: Badge, name: badge, widget: string, required: false }
              - label: Incluído
                name: includes
                widget: list
                field: { label: Item, name: item, widget: string }

  - name: servicos
    label: Serviços
    files:
      - name: servicos
        label: Categorias de Serviços
        file: src/data/services.json
        fields:
          - label: Categorias
            name: categories
            widget: list
            fields:
              - { label: ID, name: id, widget: string }
              - { label: Nome, name: label, widget: string }
              - { label: Descrição, name: desc, widget: text }
              - { label: "Imagem (URL)", name: image, widget: string }
              - label: Serviços
                name: services
                widget: list
                fields:
                  - { label: ID, name: id, widget: string }
                  - label: Ícone
                    name: icon
                    widget: select
                    options:
                      - Utensils
                      - Wine
                      - BellRing
                      - Presentation
                      - Users
                      - Briefcase
                      - Dumbbell
                      - Trees
                      - Wifi
                      - Car
                      - Shirt
                      - Lock
                      - CreditCard
                      - Clock
                      - ArrowUpDown
                      - Plane
                  - { label: Nome, name: name, widget: string }
                  - { label: Descrição, name: desc, widget: text }
                  - { label: Link, name: link, widget: string, required: false }
                  - { label: "Texto do Link", name: linkLabel, widget: string, required: false }
                  - label: Detalhes
                    name: details
                    widget: list
                    field: { label: Detalhe, name: detail, widget: string }
